# nginx public front for VMS — proxy everything to Next.js on :3000.
#
# Next rewrites `/api/*` → Nest on 127.0.0.1:4000 (see frontend/next.config.ts).
# Prefer this over a separate `location /api/` to nginx :4000, so the UI still
# works if you only expose one upstream and avoids split-brain routing.
#
# Install (replace SERVER_NAME):
#   sudo cp deploy/nginx-vms.site.conf /etc/nginx/sites-available/vms
#   sudo sed -i 's/__SERVER_NAME__/your-domain-or-ip/' /etc/nginx/sites-available/vms
#   sudo ln -sf /etc/nginx/sites-available/vms /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS with a hostname (recommended):
#   sudo certbot --nginx -d your-domain.example -d ...
#
# Firewall (if ufw enabled):
#   sudo ufw allow 80/tcp && sudo ufw allow 443/tcp && sudo ufw reload

upstream vms_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name __SERVER_NAME__;

    client_max_body_size 100M;

    location / {
        proxy_pass http://vms_frontend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 86400;
    }
}
